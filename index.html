<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Sync — Ryan & Hannah</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #F7F6F2; --surface: #FFFFFF; --surface2: #F0EFE9;
            --border: #E2E0D8; --border-strong: #C8C6BC;
            --text: #1A1916; --text-2: #6B6960; --text-3: #9E9C94;
            --blue: #2563EB; --blue-bg: #EFF4FF; --blue-text: #1E40AF;
            --pink: #DB2777; --pink-bg: #FDF2F8; --pink-text: #9D174D;
            --amber: #D97706; --amber-bg: #FFFBEB; --amber-text: #92400E;
            --today-bg: #1A1916; --today-text: #FFFFFF;
            --radius: 10px; --radius-lg: 14px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; font-size: 14px; line-height: 1.5; }
        .app { max-width: 1280px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; box-shadow: var(--shadow); }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .logo { width: 40px; height: 40px; background: var(--text); color: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; font-family: 'DM Mono', monospace; flex-shrink: 0; }
        .header-title { font-size: 16px; font-weight: 600; line-height: 1.2; }
        .header-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }
        .month-nav { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; overflow: hidden; }
        .month-nav button { background: none; border: none; cursor: pointer; padding: 8px 14px; color: var(--text-2); font-size: 16px; line-height: 1; transition: background 0.15s; }
        .month-nav button:hover { background: var(--border); color: var(--text); }
        .month-label { font-size: 13px; font-weight: 600; min-width: 148px; text-align: center; color: var(--text); font-family: 'DM Mono', monospace; padding: 0 4px; }
        .header-right { display: flex; gap: 8px; align-items: center; }
        .btn-ghost { background: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 14px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text-2); transition: all 0.15s; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 6px; }
        .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border-strong); }
        .btn-ghost svg { width: 14px; height: 14px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); }
        .stat-label { font-size: 11px; color: var(--text-3); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
        .stat-value { font-size: 26px; font-weight: 600; font-family: 'DM Mono', monospace; line-height: 1; }
        .stat-value.blue { color: var(--blue); } .stat-value.pink { color: var(--pink); }
        .stat-sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }
        .layout { display: grid; grid-template-columns: 260px 1fr; gap: 20px; align-items: start; }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
        .sidebar { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow); min-width: 0; }
        .card-title { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
        .form-group { margin-bottom: 12px; }
        .form-label { font-size: 11px; font-weight: 500; color: var(--text-3); margin-bottom: 5px; display: block; letter-spacing: 0.03em; }
        .form-input { width: 100%; padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.15s; min-width: 0; }
        .form-input:focus { border-color: var(--border-strong); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
        .form-input::placeholder { color: var(--text-3); }
        /* FIX 1: stack date fields vertically so end date never overflows */
        .date-row { display: flex; flex-direction: column; gap: 10px; }
        .person-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px; }
        .person-btn { padding: 9px; border-radius: var(--radius); font-size: 12px; font-weight: 600; border: 1.5px solid var(--border); background: var(--surface2); cursor: pointer; transition: all 0.15s; color: var(--text-3); font-family: 'DM Sans', sans-serif; }
        .person-btn.active-ryan { border-color: var(--blue); background: var(--blue-bg); color: var(--blue-text); }
        .person-btn.active-hannah { border-color: var(--pink); background: var(--pink-bg); color: var(--pink-text); }
        .toggle-row { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; margin-bottom: 12px; cursor: pointer; }
        .toggle-label { font-size: 12px; font-weight: 500; color: var(--text-2); }
        .toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; inset: 0; background: var(--border-strong); border-radius: 20px; transition: background 0.2s; }
        .toggle-slider::before { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; left: 3px; top: 3px; background: white; transition: transform 0.2s; }
        .toggle-switch input:checked + .toggle-slider { background: var(--text); }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }
        .btn-primary { width: 100%; padding: 11px; background: var(--text); color: white; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s, transform 0.1s; margin-top: 4px; }
        .btn-primary:hover { background: #333; }
        .btn-primary:active { transform: scale(0.99); }
        .form-error { font-size: 11px; color: #dc2626; margin-top: 5px; display: none; }
        .form-error.show { display: block; }
        .trip-history { max-height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .trip-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; background: var(--surface2); border-radius: var(--radius); border: 1px solid var(--border); transition: border-color 0.15s; }
        .trip-item:hover { border-color: var(--border-strong); }
        .trip-item-bar { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; }
        .trip-item-bar.ryan { background: var(--blue); } .trip-item-bar.hannah { background: var(--pink); }
        .trip-item-info { flex: 1; min-width: 0; }
        .trip-item-person { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
        .trip-item-person.ryan { color: var(--blue-text); } .trip-item-person.hannah { color: var(--pink-text); }
        .trip-item-loc { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .trip-item-dates { font-size: 11px; color: var(--text-3); margin-top: 1px; }
        .trip-delete { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 16px; line-height: 1; padding: 4px; border-radius: 6px; transition: all 0.15s; flex-shrink: 0; }
        .trip-delete:hover { color: #dc2626; background: #FEF2F2; }
        .empty-state { text-align: center; padding: 20px 10px; color: var(--text-3); font-size: 13px; }
        .legend { display: flex; flex-direction: column; gap: 8px; }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-2); }
        .legend-swatch { width: 28px; height: 12px; border-radius: 3px; flex-shrink: 0; }
        .calendar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: visible; box-shadow: var(--shadow); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }
        .cal-dow { background: var(--surface2); padding: 10px 8px; text-align: center; font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .cal-day { min-height: 100px; padding: 8px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: background 0.12s; position: relative; }
        .cal-day:hover { background: var(--surface2); }
        .cal-day.empty { background: var(--bg); cursor: default; }
        .cal-day.empty:hover { background: var(--bg); }
        .cal-day.has-overlap { background: #FFFCF0; }
        .cal-day.has-overlap:hover { background: #FFF8E1; }
        .cal-day.today { background: #FAFAF8; }
        .day-num { font-size: 12px; font-weight: 600; color: var(--text-3); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin-bottom: 5px; }
        .cal-day.today .day-num { background: var(--today-bg); color: var(--today-text); }
        .pills { display: flex; flex-direction: column; gap: 3px; }
        .pill { font-size: 10px; font-weight: 600; padding: 3px 7px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pill.ryan { background: var(--blue-bg); color: var(--blue-text); }
        .pill.hannah { background: var(--pink-bg); color: var(--pink-text); }
        .pill.overlap { background: var(--amber-bg); color: var(--amber-text); }
        .day-popup { display: none; position: absolute; z-index: 200; top: 100%; left: 0; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 12px 14px; min-width: 210px; max-width: 240px; max-height: 260px; overflow-y: auto; }
        .day-popup.flip-up { top: auto; bottom: 100%; }
        .cal-day:hover .day-popup { display: block; }
        .popup-date { font-size: 11px; font-weight: 600; color: var(--text-3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        .popup-trip { padding: 7px 9px; border-radius: 7px; margin-bottom: 5px; }
        .popup-trip:last-child { margin-bottom: 0; }
        .popup-trip.ryan { background: var(--blue-bg); } .popup-trip.hannah { background: var(--pink-bg); }
        .popup-trip-person { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
        .popup-trip-person.ryan { color: var(--blue-text); } .popup-trip-person.hannah { color: var(--pink-text); }
        .popup-trip-loc { font-size: 13px; font-weight: 500; color: var(--text); margin-top: 1px; }
        .popup-trip-dates { font-size: 11px; color: var(--text-3); margin-top: 2px; }
        #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; background: var(--text); color: white; padding: 12px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 500; box-shadow: var(--shadow-md); transform: translateY(20px); opacity: 0; transition: all 0.25s ease; display: flex; align-items: center; gap: 10px; pointer-events: none; }
        #toast.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
        #toast button { background: rgba(255,255,255,0.15); border: none; color: white; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="header-left">
            <div class="logo">TS</div>
            <div>
                <div class="header-title">Travel Sync</div>
                <div class="header-sub">Ryan &amp; Hannah's shared calendar</div>
            </div>
        </div>
        <div class="month-nav">
            <button onclick="changeMonth(-1)">&#8592;</button>
            <div class="month-label" id="monthDisplay">Loading…</div>
            <button onclick="changeMonth(1)">&#8594;</button>
        </div>
        <div class="header-right">
            <button class="btn-ghost" onclick="jumpToToday()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                Today
            </button>
        </div>
    </header>

    <div class="stats" id="statsStrip"></div>

    <div class="layout">
        <div class="sidebar">
            <div class="card">
                <div class="card-title">Add trip</div>
                <div class="person-toggle">
                    <button class="person-btn active-ryan" id="btnRyan" onclick="setPerson('Ryan')">Ryan</button>
                    <button class="person-btn" id="btnHannah" onclick="setPerson('Hannah')">Hannah</button>
                </div>
                <div class="form-group">
                    <label class="form-label" for="tripLocation">Destination</label>
                    <input type="text" id="tripLocation" class="form-input" placeholder="e.g. Tokyo, Japan">
                    <div class="form-error" id="locError">Please enter a destination.</div>
                </div>
                <label class="toggle-row" for="isSingleDay">
                    <span class="toggle-label">Single day trip</span>
                    <span class="toggle-switch">
                        <input type="checkbox" id="isSingleDay" onchange="toggleDateMode()">
                        <span class="toggle-slider"></span>
                    </span>
                </label>
                <div class="date-row" id="dateRow">
                    <div class="form-group" style="margin-bottom:0">
                        <label class="form-label" id="startLabel" for="tripStart">Start date</label>
                        <input type="date" id="tripStart" class="form-input">
                    </div>
                    <div class="form-group" id="endGroup" style="margin-bottom:0">
                        <label class="form-label" for="tripEnd">End date</label>
                        <input type="date" id="tripEnd" class="form-input">
                    </div>
                </div>
                <div class="form-error" id="dateError" style="margin-top:6px">Please enter valid dates (end can't be before start).</div>
                <button class="btn-primary" onclick="addTrip()">Log trip</button>
            </div>

            <div class="card">
                <div class="card-title">Legend</div>
                <div class="legend">
                    <div class="legend-item"><span class="legend-swatch" style="background:var(--blue-bg);border:1.5px solid #BFDBFE"></span>Ryan's trips</div>
                    <div class="legend-item"><span class="legend-swatch" style="background:var(--pink-bg);border:1.5px solid #FBCFE8"></span>Hannah's trips</div>
                    <div class="legend-item">
                        <span style="width:24px;height:24px;border-radius:50%;background:var(--today-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                            <span style="font-size:10px;font-weight:600;color:white;font-family:'DM Mono',monospace">8</span>
                        </span>
                        Today
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">History <span id="historyCount" style="font-size:11px;font-weight:400;letter-spacing:0;text-transform:none;color:var(--text-3)"></span></div>
                <div class="trip-history" id="tripList">
                    <div class="empty-state">No trips logged yet.</div>
                </div>
            </div>
        </div>

        <div class="calendar-wrap">
            <div id="calendarDays" class="cal-grid"></div>
        </div>
    </div>
</div>

<div id="toast">
    <span id="toastMsg"></span>
    <button id="undoBtn" onclick="undoDelete()">Undo</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAkzpDjl42VcYPp5YkQSYVnxLHLq3XkpCw",
    authDomain: "calendar-afe4e.firebaseapp.com",
    projectId: "calendar-afe4e",
    storageBucket: "calendar-afe4e.firebasestorage.app",
    messagingSenderId: "813186329775",
    appId: "1:813186329775:web:8e406932c403d57119b85a"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── State ──────────────────────────────────────────────────────────────
let trips          = [];
let viewDate       = new Date(); viewDate.setDate(1);
let selectedPerson = 'Ryan';
let lastDeleted    = null;
let toastTimer     = null;

// today fixed at midnight once — never recalculated
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

// ── Date helpers ───────────────────────────────────────────────────────
// FIX: parse "YYYY-MM-DD" as LOCAL midnight, not UTC (avoids off-by-one day bugs)
function localDate(str) {
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d);
}

// Build "YYYY-MM-DD" key from local year/month/day — no UTC conversion
function toKey(y, m, d) {
    return `${y}-${String(m + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function parseTrip(t) {
    return { ...t, startDate: localDate(t.start), endDate: localDate(t.end) };
}

function fmt(str) {
    return localDate(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function fmtFull(str) {
    return localDate(str).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
function daysBetween(a, b) { return Math.round((b - a) / 86400000) + 1; }
function daysUntil(str)    { return Math.round((localDate(str) - TODAY) / 86400000); }

// ── Overlap map ────────────────────────────────────────────────────────
function getOverlapDays() {
    const ryanDays = new Set(), hannahDays = new Set();
    trips.forEach(t => {
        const { startDate, endDate } = parseTrip(t);
        const cur = new Date(startDate);
        while (cur <= endDate) {
            const key = cur.toISOString().slice(0,10);
            (t.person === 'Ryan' ? ryanDays : hannahDays).add(key);
            cur.setDate(cur.getDate() + 1);
        }
    });
    return { ryanDays, hannahDays };
}

// ── UI toggles ─────────────────────────────────────────────────────────
window.toggleDateMode = function() {
    const single = document.getElementById('isSingleDay').checked;
    document.getElementById('endGroup').style.display  = single ? 'none' : '';
    document.getElementById('startLabel').textContent  = single ? 'Date' : 'Start date';
};

window.setPerson = function(name) {
    selectedPerson = name;
    document.getElementById('btnRyan').className    = 'person-btn' + (name === 'Ryan'   ? ' active-ryan'   : '');
    document.getElementById('btnHannah').className  = 'person-btn' + (name === 'Hannah' ? ' active-hannah' : '');
};

window.changeMonth = function(offset) {
    viewDate.setMonth(viewDate.getMonth() + offset);
    renderCalendar();
    renderStats(); // FIX: stats re-render so "Away in [month]" updates when navigating
};

window.jumpToToday = function() {
    viewDate = new Date(); viewDate.setDate(1);
    renderCalendar(); renderStats();
};

window.jumpToNextTrip = function() {
    const next = trips.map(parseTrip)
        .filter(t => t.endDate >= TODAY)
        .sort((a,b) => a.startDate - b.startDate)[0];
    if (!next) return showToast('No upcoming trips found.', false);
    viewDate = new Date(next.startDate.getFullYear(), next.startDate.getMonth(), 1);
    renderCalendar(); renderStats();
};

// ── Toast ──────────────────────────────────────────────────────────────
function showToast(msg, showUndo) {
    clearTimeout(toastTimer);
    document.getElementById('toastMsg').textContent = msg;
    document.getElementById('undoBtn').style.display = showUndo ? '' : 'none';
    document.getElementById('toast').classList.add('show');
    toastTimer = setTimeout(() => document.getElementById('toast').classList.remove('show'), 4000);
}
window.hideToast = function() { document.getElementById('toast').classList.remove('show'); };

// ── Firestore CRUD ─────────────────────────────────────────────────────
window.addTrip = async function() {
    const loc    = document.getElementById('tripLocation').value.trim();
    const start  = document.getElementById('tripStart').value;
    const single = document.getElementById('isSingleDay').checked;
    const end    = single ? start : document.getElementById('tripEnd').value;

    const locErr  = !loc;
    const dateErr = !start || (!single && !end) || (start && end && end < start);
    document.getElementById('locError').classList.toggle('show', locErr);
    document.getElementById('dateError').classList.toggle('show', dateErr);
    if (locErr || dateErr) return;

    try {
        await addDoc(collection(db, 'trips'), {
            person: selectedPerson, location: loc,
            start, end, isSingle: single, createdAt: Date.now()
        });
        document.getElementById('tripLocation').value = '';
        const todayStr = TODAY.toISOString().slice(0,10);
        document.getElementById('tripStart').value = todayStr;
        document.getElementById('tripEnd').value   = todayStr;
        document.getElementById('locError').classList.remove('show');
        document.getElementById('dateError').classList.remove('show');
        showToast('Trip saved!', false);
    } catch(e) { showToast('Failed to save trip.', false); console.error(e); }
};

window.deleteTrip = async function(id) {
    const idx = trips.findIndex(t => t.id === id);
    if (idx === -1) return;
    lastDeleted = { trip: trips[idx] };
    try {
        await deleteDoc(doc(db, 'trips', id));
        showToast('Trip deleted.', true);
    } catch(e) { showToast('Failed to delete.', false); }
};

window.undoDelete = async function() {
    if (!lastDeleted) return;
    const t = lastDeleted.trip;
    try {
        await addDoc(collection(db, 'trips'), {
            person: t.person, location: t.location,
            start: t.start, end: t.end,
            isSingle: t.isSingle, createdAt: t.createdAt || Date.now()
        });
        lastDeleted = null;
        window.hideToast();
    } catch(e) { console.error(e); }
};

// ── Render: stats ──────────────────────────────────────────────────────
function renderStats() {
    const { ryanDays, hannahDays } = getOverlapDays();
    const ryanTrips   = trips.filter(t => t.person === 'Ryan').length;
    const hannahTrips = trips.filter(t => t.person === 'Hannah').length;

    // FIX: use viewDate's month so stat label and values move with calendar navigation
    const vy  = viewDate.getFullYear();
    const vm  = viewDate.getMonth();
    const dim = new Date(vy, vm + 1, 0).getDate();
    let ryanAway = 0, hannahAway = 0;
    for (let d = 1; d <= dim; d++) {
        const key = toKey(vy, vm, d);
        if (ryanDays.has(key))   ryanAway++;
        if (hannahDays.has(key)) hannahAway++;
    }
    const monthName = viewDate.toLocaleDateString('en-US', { month: 'short' });

    const next = trips.map(parseTrip)
        .filter(t => t.startDate >= TODAY)
        .sort((a,b) => a.startDate - b.startDate)[0];

    let nextHtml, nextSub;
    if (next) {
        const du    = daysUntil(next.start);
        const color = next.person === 'Ryan' ? 'var(--blue)' : 'var(--pink)';
        nextHtml = `<div class="stat-value" style="color:${color};font-size:20px;line-height:1.2">${du === 0 ? 'Today' : du + 'd'}</div>`;
        nextSub  = `${next.person} · ${next.location}`;
    } else {
        nextHtml = `<div class="stat-value" style="color:var(--text-3);font-size:20px">—</div>`;
        nextSub  = 'No upcoming trips';
    }

    document.getElementById('statsStrip').innerHTML = `
        <div class="stat-card"><div class="stat-label">Ryan's trips</div><div class="stat-value blue">${ryanTrips}</div><div class="stat-sub">${ryanDays.size} days total</div></div>
        <div class="stat-card"><div class="stat-label">Hannah's trips</div><div class="stat-value pink">${hannahTrips}</div><div class="stat-sub">${hannahDays.size} days total</div></div>
        <div class="stat-card">
            <div class="stat-label">Away in ${monthName}</div>
            <div class="stat-value" style="font-size:18px;padding-top:2px">
                <span style="color:var(--blue)">${ryanAway}d</span>
                <span style="color:var(--text-3);font-weight:400;font-size:13px"> · </span>
                <span style="color:var(--pink)">${hannahAway}d</span>
            </div>
            <div class="stat-sub">Ryan · Hannah</div>
        </div>
        <div class="stat-card"><div class="stat-label">Next trip</div>${nextHtml}<div class="stat-sub">${nextSub}</div></div>
    `;
}

// ── Render: trip list ──────────────────────────────────────────────────
function renderTripList() {
    const list  = document.getElementById('tripList');
    const count = document.getElementById('historyCount');
    if (!trips.length) {
        list.innerHTML = '<div class="empty-state">No trips logged yet.</div>';
        count.textContent = ''; return;
    }
    count.textContent = trips.length + ' total';
    const sorted = [...trips].sort((a,b) => new Date(b.start) - new Date(a.start));
    list.innerHTML = sorted.map(t => {
        const dur = daysBetween(localDate(t.start), localDate(t.end));
        return `
            <div class="trip-item">
                <div class="trip-item-bar ${t.person.toLowerCase()}"></div>
                <div class="trip-item-info">
                    <div class="trip-item-person ${t.person.toLowerCase()}">${t.person}</div>
                    <div class="trip-item-loc">${t.location}</div>
                    <div class="trip-item-dates">${fmt(t.start)}${t.isSingle ? '' : ' – ' + fmt(t.end)} · ${dur}d</div>
                </div>
                <button class="trip-delete" onclick="deleteTrip('${t.id}')">&times;</button>
            </div>`;
    }).join('');
}

// ── Render: calendar ───────────────────────────────────────────────────
function renderCalendar() {
    const grid  = document.getElementById('calendarDays');
    const label = document.getElementById('monthDisplay');
    const DOW   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    grid.innerHTML = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');

    const year       = viewDate.getFullYear();
    const month      = viewDate.getMonth();
    const firstDay   = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    label.textContent = viewDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

    const { ryanDays, hannahDays } = getOverlapDays();

    // Empty leading cells
    for (let i = 0; i < firstDay; i++) {
        const el = document.createElement('div');
        el.className = 'cal-day empty';
        grid.appendChild(el);
    }

    const totalRows = Math.ceil((firstDay + daysInMonth) / 7);

    for (let d = 1; d <= daysInMonth; d++) {
        // FIX: construct cell date from local y/m/d — eliminates the UTC-shift off-by-one
        const cellDate = new Date(year, month, d);
        const key      = toKey(year, month, d);
        const isToday  = cellDate.getTime() === TODAY.getTime();
        const cellRow  = Math.ceil((firstDay + d) / 7); // which row this day is in

        const hasRyan   = ryanDays.has(key);
        const hasHannah = hannahDays.has(key);

        // FIX: compare cellDate (local midnight) against parsed trip dates (local midnight)
        // so first and last days of trips render correctly
        const active = trips.map(parseTrip).filter(t =>
            cellDate >= t.startDate && cellDate <= t.endDate
        );

        let cls = 'cal-day';
        if (isToday)              cls += ' today';
        if (hasRyan && hasHannah) cls += ' has-overlap';

        let pillsHtml = '';
        if (hasRyan && hasHannah) {
            const rLoc = active.find(t => t.person === 'Ryan')?.location    || '';
            const hLoc = active.find(t => t.person === 'Hannah')?.location  || '';
            pillsHtml = `<div class="pill overlap">Both away</div>`;
            if (rLoc !== hLoc) pillsHtml += `
                <div class="pill ryan" style="font-size:9px;opacity:.8">${rLoc}</div>
                <div class="pill hannah" style="font-size:9px;opacity:.8">${hLoc}</div>`;
        } else {
            active.forEach(t => {
                pillsHtml += `<div class="pill ${t.person === 'Ryan' ? 'ryan' : 'hannah'}">${t.isSingle ? '· ' : ''}${t.location}</div>`;
            });
        }

        // Flip popup upward for days in the last 2 rows so it never gets clipped
        const flipUp = cellRow >= totalRows - 1;

        let popupHtml = '';
        if (active.length) {
            popupHtml = `<div class="day-popup${flipUp ? ' flip-up' : ''}"><div class="popup-date">${fmtFull(key)}</div>`;
            active.forEach(t => {
                const c = t.person.toLowerCase();
                popupHtml += `
                    <div class="popup-trip ${c}">
                        <div class="popup-trip-person ${c}">${t.person}</div>
                        <div class="popup-trip-loc">${t.location}</div>
                        <div class="popup-trip-dates">${fmt(t.start)}${t.isSingle ? '' : ' – ' + fmt(t.end)}</div>
                    </div>`;
            });
            popupHtml += '</div>';
        }

        const cell = document.createElement('div');
        cell.className = cls;
        cell.innerHTML = `<div class="day-num">${d}</div><div class="pills">${pillsHtml}</div>${popupHtml}`;
        grid.appendChild(cell);
    }
}

function renderAll() { renderStats(); renderTripList(); renderCalendar(); }

// ── Init ───────────────────────────────────────────────────────────────
const todayStr = TODAY.toISOString().slice(0,10);
document.getElementById('tripStart').value       = todayStr;
document.getElementById('tripEnd').value         = todayStr;
document.getElementById('undoBtn').style.display = 'none';

// Real-time Firestore listener — updates all views instantly for both users
onSnapshot(collection(db, 'trips'), snapshot => {
    trips = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
});
</script>
